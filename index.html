<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专题证书 - 证书查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", SimHei, sans-serif;
        }
        body {
            background: #ffffff;
            font-size: 15px;
            color: #333;
        }
        /* 顶部深蓝色标题栏 */
        .header-bar {
            width: 100%;
            height: 48px;
            background-color: #2468b3;
            color: #fff;
            line-height: 48px;
            padding-left: 16px;
            font-size: 19px;
        }
        /* 搜索框区域 */
        .search-wrap {
            padding: 18px 16px;
            border: 1px solid #c0d4eb;
        }
        .search-tip {
            font-size: 15px;
            margin-bottom: 10px;
        }
        .search-input-row {
            display: flex;
            gap: 0;
        }
        #searchKey {
            flex: 1;
            height: 40px;
            padding: 0 10px;
            border: 1px solid #b8c8e0;
            border-right: none;
            font-size: 15px;
        }
        #searchBtn {
            width: 80px;
            height: 40px;
            border: 1px solid #b8c8e0;
            background: #fff;
            cursor: pointer;
            font-size: 15px;
        }
        /* 证书结果面板 */
        .result-box {
            margin: 24px 16px;
            border: 3px solid #d0e6f7;
            padding: 16px;
            display: none;
        }
        .top-empty-line {
            height: 30px;
            border-bottom: 1px solid #c6e0f5;
            margin-bottom: 12px;
        }
        /* 活动蓝色标题条 */
        .activity-title {
            width: 100%;
            background-color: #2468b3;
            color: #fff;
            padding: 10px 12px;
            font-size: 16px;
            margin-bottom: 8px;
        }
        /* 信息单行样式 */
        .info-line {
            padding: 9px 0;
            border-bottom: 1px solid #e2e9f3;
            font-size: 15px;
        }
        .info-label {
            display: inline-block;
            min-width: 130px;
            color: #222;
        }
        /* 无数据提示 */
        .empty-tip {
            margin: 40px 0;
            text-align: center;
            font-size: 17px;
            color: #888;
            display: none;
        }
        /* 页面底部备案文字 */
        .footer-text {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: #444;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- 顶部标题蓝条 -->
    <div class="header-bar">
       专题证书 - 证书查询
    </div>

    <!-- 搜索区域 -->
    <div class="search-wrap">
        <div class="search-tip">请输入您的编号/作品名称/姓名/单位</div>
        <div class="search-input-row">
            <input type="text" id="searchKey" placeholder="输入姓名、证书编号、作品名查询">
            <button id="searchBtn" onclick="searchCert()">查询</button>
        </div>
    </div>

    <!-- 无查询结果提示 -->
    <div class="empty-tip" id="emptyTip">
        未查询到匹配证书信息，请核对关键词后重新输入
    </div>

    <!-- 证书查询结果面板 -->
    <div class="result-box" id="resultBox">
        <div class="top-empty-line"></div>
        <div class="activity-title" id="actName">2025年全国中小学生语文征文大赛</div>

        <div class="info-line">
            <span class="info-label">主办单位：</span>
            <span id="hostOrg">全国中小学语文竞赛组委会</span>
        </div>
        <div class="info-line">
            <span class="info-label">年份：</span>
            <span id="yearText">2025年度</span>
        </div>
        <div class="info-line">
            <span class="info-label">获奖者：</span>
            <span id="stuName">莫敏君</span>
        </div>
        <div class="info-line">
            <span class="info-label">获奖者单位：</span>
            <span id="schoolName">忠县三汇中学校</span>
        </div>
        <div class="info-line">
            <span class="info-label">证书编号：</span>
            <span id="certNo">QG202601091218</span>
        </div>
        <div class="info-line">
            <span class="info-label">作品名称：</span>
            <span id="workTitle">《诵写古今，不负少年韶华》</span>
        </div>
        <div class="info-line">
            <span class="info-label">奖项：</span>
            <span id="prizeInfo">中学生组征文一等奖</span>
        </div>
        <div class="info-line">
            <span class="info-label">指导教师：</span>
            <span id="teaName">陈阳</span>
        </div>
        <div class="info-line">
            <span class="info-label">教师荣誉：</span>
            <span id="teaPrize">优秀指导教师</span>
        </div>
    </div>

    <!-- 页面底部说明文字 -->
    <div class="footer-text">
        主办：全国国教杯作文教育创新大赛组委会 备案号：京ICP备905951号-1<br>
        本页面仅用于证书核验，数据真实有效
    </div>

<script>
    // 校内证书数据库
    const certData = [
        {
            actName: "2025年全国中小学生语文征文大赛",
            hostOrg: "全国中小学语文竞赛组委会",
            yearText: "2025年度",
            stuName: "莫敏君",
            schoolName: "忠县三汇中学校",
            certNo: "QG202601091218",
            workTitle: "《诵写古今，不负少年韶华》",
            prizeInfo: "中学生组征文一等奖",
            teaName: "陈阳",
            teaPrize: "优秀指导教师"
        }
    ];

    function searchCert() {
        let key = document.getElementById("searchKey").value.trim();
        let resultBox = document.getElementById("resultBox");
        let emptyTip = document.getElementById("emptyTip");

        // 重置页面显示
        resultBox.style.display = "none";
        emptyTip.style.display = "none";

        if (!key) {
            emptyTip.innerText = "请输入姓名、证书编号或作品名称进行查询";
            emptyTip.style.display = "block";
            return;
        }

        // 模糊匹配任意字段
        let target = null;
        for (let item of certData) {
            if (
                item.stuName.includes(key) ||
                item.teaName.includes(key) ||
                item.certNo.includes(key) ||
                item.workTitle.includes(key) ||
                item.schoolName.includes(key)
            ) {
                target = item;
                break;
            }
        }

        if (target) {
            // 填充证书所有信息
            document.getElementById("actName").innerText = target.actName;
            document.getElementById("hostOrg").innerText = target.hostOrg;
            document.getElementById("yearText").innerText = target.yearText;
            document.getElementById("stuName").innerText = target.stuName;
            document.getElementById("schoolName").innerText = target.schoolName;
            document.getElementById("certNo").innerText = target.certNo;
            document.getElementById("workTitle").innerText = target.workTitle;
            document.getElementById("prizeInfo").innerText = target.prizeInfo;
            document.getElementById("teaName").innerText = target.teaName;
            document.getElementById("teaPrize").innerText = target.teaPrize;
            resultBox.style.display = "block";
        } else {
            emptyTip.style.display = "block";
        }
    }
</script>
</body>
</html>
